services:
  - type: web
    name: inventory-order-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: inventory-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: inventory-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: inventory-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: inventory-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: inventory-db
          property: database

databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free

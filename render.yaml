services:
  - type: web
    name: inventory-order-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    rootDir: backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free
